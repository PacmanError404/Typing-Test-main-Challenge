<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Typing Speed Test</title>
  <link rel="stylesheet" href="style_base.css">
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->

    .attribution { font-size: 0.6875rem; text-align: center; }

<body>
<header class="navbar">
<div class="tst"><img src="/assets/images/logo-large.svg" alt=""></div>
<div class="pb"><img src="/assets/images/icon-personal-best.svg" alt=""><span style="color: #727279;">   Personal Best:</span> 92 WPM</div>
</header>

<main>
    <div class="picture1"><img src="/assets/images/icon-completed.svg" alt=""></div>
    <div class="picture2"><img src="/assets/images/icon-completed.svg" alt=""></div>
    <div class="picture3"><img src="/assets/images/icon-completed.svg" alt=""></div>
    <div class="flag">Baseline Estabilished!</div>
    <div class="flag_body">You've set the bar. Now the real challenge begins-time to beat it.</div>

        <div class="wpm_res">WPM: 85</div>
        <div class="acc_res">Accuracy: 90%</div>
        <div class="charac_res">Characters 120/5</div>
    </div>
    <div class="beat">Beat this score <img src="/assets/images/icon-restart.svg" alt=""></div>
</main>
